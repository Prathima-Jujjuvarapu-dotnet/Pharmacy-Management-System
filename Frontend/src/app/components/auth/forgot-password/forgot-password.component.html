<div class="auth-wrapper">
    <div class="auth-card">
      <h2>Forgot Password</h2>
      <p class="subtitle">Reset your password in three simple steps</p>
  
      <!-- Step 1: Email -->
      <form *ngIf="step === 'email'" (ngSubmit)="requestPasswordReset(email)">
        <input type="email" [(ngModel)]="email" name="email" placeholder="Enter your email" required />
        <button type="submit">Send OTP</button>
      </form>
  
      <!-- Step 2: OTP -->
      <form *ngIf="step === 'otp'" (ngSubmit)="verifyOtpAndProceed(otp)">
        <input type="text" [(ngModel)]="otp" name="otp" placeholder="Enter OTP" required />
        <button type="submit">Verify OTP</button>
      </form>
  
      <!-- Step 3: New Password -->
      <form *ngIf="step === 'newPassword'" (ngSubmit)="passwordReset(otp, newPassword, email)">
        <input type="password" [(ngModel)]="newPassword" name="newPassword" placeholder="Enter new password" required />
        <button type="submit">Reset Password</button>
      </form>
  
      <a [routerLink]="'/login'" class="auth-link">Back to Login</a>
    </div>
  </div>
