<div class="sidebar">
  <nav>
    <ul>
      <li *ngFor="let item of menuItems">
        <a [routerLink]="item.route">
          <span [innerHTML]="item.icon"></span> {{ item.label }}
        </a>
      </li>
    </ul>
  </nav>
  <button class="logout-btn" (click)="logout()">Logout</button>
</div>
